project:
  name: Hirota Future Product Lab Report System
  version: 1.0
  company: （自社名を設定）
  department: （部署名を設定）
  lab_name: Hirota Future Product Lab

author:
  default_name: 廣田
  style_file: Config/FPL_STYLE.md

report:
  main_file: Report.md
  source_file: Nippou.txt
  image_dirs:
    - Images
    - images
  photo_width: 800
  unused_dirs:
    - unUsed
    - unused_images
  backup_dir: backup
  edit_log: edit_log.md

publish:
  readme_file: README.md
  changelog_file: CHANGELOG.md
  release_notes_file: release_notes.md
  publish_summary_file: PUBLISH_SUMMARY.md
  ready_threshold: 90

archive:
  knowledge_dir: Knowledge
  companies_dir: Companies
  trends_dir: Trends
  ideas_dir: Ideas
  archive_log: Reports/archive_log.md

workflow:
  make: true
  review: true
  publish: true
  archive: true
